<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Timer</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      body {
        font-family: 'Courier New', Courier, monospace;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: var(--bg-color, #000000);
        color: var(--normal-color, #ffffff);
        transition:
          background-color 0.3s,
          color 0.3s;
      }

      #app {
        text-align: center;
        width: 100%;
      }

      .display {
        font-size: 30vw;
        line-height: 1;
        cursor: default;
        user-select: none;
      }

      .display.warning {
        color: var(--warning-color, #ff0000);
      }

      .display.blink {
        animation: blink-animation 0.5s steps(2, start) infinite;
      }

      @keyframes blink-animation {
        to {
          visibility: hidden;
        }
      }

      .display.flash {
        animation: flash-animation 0.3s ease-in-out 3;
      }

      @keyframes flash-animation {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }

      .controls {
        margin-top: 2vw;
        display: flex;
        gap: 1vw;
        justify-content: center;
        flex-wrap: wrap;
      }

      .controls button {
        font-family: inherit;
        font-size: 2.5vw;
        padding: 0.8vw 2vw;
        min-width: 9ch;
        border: 2px solid var(--normal-color, #ffffff);
        background: transparent;
        color: var(--normal-color, #ffffff);
        cursor: pointer;
        border-radius: 4px;
      }

      .controls button:hover:not(:disabled) {
        background: var(--normal-color, #ffffff);
        color: var(--bg-color, #000000);
      }

      .controls button:disabled {
        opacity: 0.3;
        cursor: default;
      }

      .settings-btn {
        position: fixed;
        top: 1vw;
        right: 1vw;
        font-size: 3vw;
        background: none;
        border: none;
        color: var(--normal-color, #ffffff);
        cursor: pointer;
        opacity: 0.5;
        font-family: inherit;
      }

      .settings-btn:hover:not(:disabled) {
        opacity: 1;
      }

      .settings-btn:disabled {
        opacity: 0.15;
        cursor: default;
      }

      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.9);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100;
        overflow-y: auto;
      }

      .overlay.hidden {
        display: none;
      }

      .settings-panel {
        background: #111;
        color: #fff;
        padding: 2rem;
        border-radius: 8px;
        max-width: 400px;
        width: 90%;
        font-family: inherit;
        margin: auto;
      }

      .settings-panel h2 {
        margin-bottom: 1rem;
      }

      .settings-panel label {
        display: block;
        margin-bottom: 0.5rem;
        font-size: 0.9rem;
      }

      .settings-panel input {
        width: 100%;
        padding: 0.4rem;
        margin-bottom: 1rem;
        font-family: inherit;
        font-size: 1rem;
        border: 1px solid #444;
        border-radius: 4px;
        background: #222;
        color: #fff;
      }

      .settings-panel input[type='color'] {
        height: 2rem;
        padding: 0.2rem;
        cursor: pointer;
      }

      .settings-panel .btn-row {
        display: flex;
        gap: 0.5rem;
        margin-top: 1rem;
      }

      .settings-panel button {
        flex: 1;
        padding: 0.5rem;
        font-family: inherit;
        font-size: 1rem;
        border: 1px solid #444;
        border-radius: 4px;
        cursor: pointer;
        background: #333;
        color: #fff;
      }

      .settings-panel button:hover {
        background: #555;
      }
    </style>
